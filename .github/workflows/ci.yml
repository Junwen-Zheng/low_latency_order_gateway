name: CI Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate-and-benchmark-smoke:
    name: Strict build, sanitizers, tests, and benchmark smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 2

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes cmake g++

      - name: Run quality gate and benchmark smoke
        run: ./scripts/run_ci_smoke.sh benchmark_results/ci_smoke
